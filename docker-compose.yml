services:
  miniredis:
    build:
      context: .
    image: miniredis:local
    container_name: miniredis
    environment:
      MINIREDIS_PORT: "${MINIREDIS_PORT:-6379}"
      MINIREDIS_MEMORY_MB: "${MINIREDIS_MEMORY_MB:-256}"
      MINIREDIS_MAX_CLIENTS: "${MINIREDIS_MAX_CLIENTS:-8000}"
      MINIREDIS_MAX_VALUE_BYTES: "${MINIREDIS_MAX_VALUE_BYTES:-1048576}"
      MINIREDIS_GLOBAL_RATE_LIMIT_PER_SECOND: "${MINIREDIS_GLOBAL_RATE_LIMIT_PER_SECOND:-50000}"
      MINIREDIS_IP_RATE_LIMIT_PER_SECOND: "${MINIREDIS_IP_RATE_LIMIT_PER_SECOND:-1000}"
      MINIREDIS_READ_TIMEOUT: "${MINIREDIS_READ_TIMEOUT:-5s}"
      MINIREDIS_WRITE_TIMEOUT: "${MINIREDIS_WRITE_TIMEOUT:-5s}"
      MINIREDIS_IDLE_TIMEOUT: "${MINIREDIS_IDLE_TIMEOUT:-30s}"
    ports:
      - "${MINIREDIS_PORT:-6379}:${MINIREDIS_PORT:-6379}"
    mem_limit: "${MINIREDIS_MEMORY_MB:-256}m"
    ulimits:
      nofile:
        soft: 1048576
        hard: 1048576
    restart: unless-stopped
