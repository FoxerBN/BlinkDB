services:
  blinkdb:
    build:
      context: .
    image: blinkdb:local
    container_name: blinkdb
    environment:
      BLINKDB_PORT: "${BLINKDB_PORT:-6379}"
      BLINKDB_MEMORY_MB: "${BLINKDB_MEMORY_MB:-256}"
      BLINKDB_MAX_CLIENTS: "${BLINKDB_MAX_CLIENTS:-8000}"
      BLINKDB_MAX_VALUE_BYTES: "${BLINKDB_MAX_VALUE_BYTES:-1048576}"
      BLINKDB_GLOBAL_RATE_LIMIT_PER_SECOND: "${BLINKDB_GLOBAL_RATE_LIMIT_PER_SECOND:-50000}"
      BLINKDB_IP_RATE_LIMIT_PER_SECOND: "${BLINKDB_IP_RATE_LIMIT_PER_SECOND:-1000}"
      BLINKDB_READ_TIMEOUT: "${BLINKDB_READ_TIMEOUT:-30s}"
      BLINKDB_WRITE_TIMEOUT: "${BLINKDB_WRITE_TIMEOUT:-5s}"
      BLINKDB_IDLE_TIMEOUT: "${BLINKDB_IDLE_TIMEOUT:-30s}"
    ports:
      - "${BLINKDB_PORT:-6379}:${BLINKDB_PORT:-6379}"
    mem_limit: "${BLINKDB_MEMORY_MB:-256}m"
    ulimits:
      nofile:
        soft: 1048576
        hard: 1048576
    restart: unless-stopped
